application:
  name: lightdash
  pods:
  - name: app
    image: mirror.gcr.io/lightdash/lightdash:latest
    path: /
    servicePorts:
    - 8080
    vars:
      PGHOST: lightdash-postgres-service
      PGPORT: "5432"
      PGDATABASE: lightdash
      PGUSER: lightdash
      PGPASSWORD: lightdash
      DATABASE_HOST: lightdash-postgres-service
      DATABASE_PORT: "5432"
      DATABASE_NAME: lightdash
      DATABASE_USER: lightdash
      DATABASE_PASSWORD: lightdash
      LIGHTDASH_SECRET: "a1b2c3d4e5f6a1b2c3d4"
      SECRET: "a1b2c3d4e5f6a1b2c3d4"
      PORT: "8080"
      SITE_URL: "https://relaxed-weasel-lightdash.cloud.nexlayer.ai"
      TRUST_PROXY: "true"
  - name: postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: lightdash
      POSTGRES_USER: lightdash
      POSTGRES_PASSWORD: lightdash
    volumes:
    - name: lightdash-db
      mountPath: /var/lib/postgresql/data
      size: 10Gi
