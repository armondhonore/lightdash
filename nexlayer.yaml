application:
  name: lightdash
  pods:
  - name: app
    image: mirror.gcr.io/lightdash/lightdash:latest
    path: /
    servicePorts:
    - 8080
    vars:
      PGHOST: lightdash-postgres-service
      PGPORT: "5432"
      PGDATABASE: lightdash
      PGUSER: lightdash
      PGPASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_HOST: lightdash-postgres-service
      DATABASE_PORT: "5432"
      DATABASE_NAME: lightdash
      DATABASE_USER: lightdash
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      LIGHTDASH_SECRET: "a1b2c3d4e5f6a1b2c3d4"
      SECRET: "a1b2c3d4e5f6a1b2c3d4"
      PORT: "8080"
      SITE_URL: "https://relaxed-weasel-lightdash.cloud.nexlayer.ai"
      TRUST_PROXY: "true"
      S3_ENDPOINT: "http://lightdash-minio-service:9000"
      S3_BUCKET: "lightdash"
      S3_REGION: "us-east-1"
      S3_ACCESS_KEY: "lightdash"
      S3_SECRET_KEY: "lightdash123"
      S3_FORCE_PATH_STYLE: "true"
  - name: postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: lightdash
      POSTGRES_USER: lightdash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
    - name: lightdash-db
      mountPath: /var/lib/postgresql/data
      size: 10Gi
  - name: minio
    image: mirror.gcr.io/minio/minio:latest
    command: server /data --console-address :9001
    servicePorts:
    - 9000
    vars:
      MINIO_ROOT_USER: "lightdash"
      MINIO_ROOT_PASSWORD: "lightdash123"
    volumes:
    - name: lightdash-minio
      mountPath: /data
      size: 10Gi
